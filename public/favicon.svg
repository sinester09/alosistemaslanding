<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5FEE"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:0.95"/>
    </linearGradient>
  </defs>

  <!-- Fondo con gradiente -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Letra "A" estilizada -->
  <path d="M 32 16 L 44 48 L 38 48 L 36 41 L 28 41 L 26 48 L 20 48 L 32 16 Z M 29.5 36 L 34.5 36 L 32 25 L 29.5 36 Z"
        fill="url(#letter)"/>

  <!-- Punto de acento (tecnología/IA) -->
  <circle cx="48" cy="18" r="5" fill="#3FD48A" opacity="0.95"/>
  <circle cx="48" cy="18" r="3.5" fill="#3FD48A">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
